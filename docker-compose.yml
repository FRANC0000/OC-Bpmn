version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: bpm-postgres
    environment:
      POSTGRES_DB: bpm_platform
      POSTGRES_USER: bpmadmin
      POSTGRES_PASSWORD: bpmadmin
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bpmadmin -d bpm_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bpm-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bpmplatform.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
