server:
  port: 8080

spring:
  application:
    name: bpm-platform

  datasource:
    url: jdbc:postgresql://localhost:5432/bpm_platform
    username: ${DB_USERNAME:bpmadmin}
    password: ${DB_PASSWORD:bpmadmin}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL:20}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      idle-timeout: 300000
      connection-timeout: 10000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      pool-name: BpmPlatformPool
      connection-test-query: SELECT 1
      validation-timeout: 3000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        multiTenancy: SCHEMA
        tenant_identifier_resolver: com.bpmplatform.infrastructure.multitenant.TenantIdentifierResolverImpl
        multi_tenant_connection_provider: com.bpmplatform.infrastructure.multitenant.TenantConnectionProviderImpl
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true
          batch_versioned_data: true
          fetch_size: 200
        query:
          in_clause_parameter_padding: true
          plan_cache_max_size: 4096
          plan_parameter_metadata_max_size: 64
        generate_statistics: false
        cache:
          use_second_level_cache: false
          use_query_cache: false
        default_batch_fetch_size: 16
        connection:
          provider_disables_autocommit: true
          autocommit: false

  flyway:
    enabled: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

app:
  flyway:
    shared-migrations-location: classpath:db/migration/shared
    tenant-migrations-location: classpath:db/migration/tenant

logging:
  level:
    com.bpmplatform: DEBUG
    org.springframework: WARN
    org.hibernate: WARN
    com.zaxxer.hikari: WARN
