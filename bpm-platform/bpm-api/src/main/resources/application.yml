server:
  port: 8080

spring:
  application:
    name: bpm-platform
  datasource:
    url: jdbc:postgresql://localhost:5432/bpm_platform
    username: ${DB_USERNAME:bpmadmin}
    password: ${DB_PASSWORD:bpmadmin}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
    open-in-view: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.bpmplatform: DEBUG
    org.springframework: WARN
    org.hibernate: WARN
